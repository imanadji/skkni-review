      const ringPolygons = levels.map((lvl) => {
        return keys.map((_, i) => {
          const angle = (i * 2 * Math.PI) / totalAxes - Math.PI / 2;
          const x = cx + r * lvl * Math.cos(angle);
          const y = cy + r * lvl * Math.sin(angle);
          return `${x},${y}`;
        }).join(" ");
      });

      // Actual Data polygon coordinates
      const dataPoints = keys.map((key, i) => {
        const val = data[key];
        const factor = (val / maxVal) * r;
        const angle = (i * 2 * Math.PI) / totalAxes - Math.PI / 2;
        const x = cx + factor * Math.cos(angle);
        const y = cy + factor * Math.sin(angle);
        return { x, y, value: val, label: key, angle };
      });

      const polygonStr = dataPoints.map(p => `${p.x},${p.y}`).join(" ");

      return (
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col items-center justify-center">
          <h4 class="text-xs font-bold text-slate-700 mb-4 text-center tracking-wider uppercase">{title}</h4>
          <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`} class="max-w-full h-auto">
            {/* Grid concentric polygons */}
            {ringPolygons.map((pts, idx) => (
              <polygon 
                key={idx} 
                points={pts} 
                fill="none" 
                stroke="#e2e8f0" 
                strokeWidth="1" 
                strokeDasharray={idx === 3 ? "none" : "3,3"}
              />
            ))}

            {/* Grid Radial Axis Lines */}
            {keys.map((_, i) => {
              const angle = (i * 2 * Math.PI) / totalAxes - Math.PI / 2;
              const x2 = cx + r * Math.cos(angle);
              const y2 = cy + r * Math.sin(angle);
              return (
                <line 
                  key={i} 
                  x1={cx} 
                  y1={cy} 
                  x2={x2} 
                  y2={y2} 
                  stroke="#cbd5e1" 
                  strokeWidth="1" 
                />
              );
            })}

            {/* Actual Data Fill Area */}
            <polygon 
              points={polygonStr} 
              fill="rgba(99, 102, 241, 0.15)" 
              stroke="#6366f1" 
              strokeWidth="2.5" 
              class="transition-all duration-500 ease-in-out"
            />

            {/* Vertices marker circles */}
            {dataPoints.map((pt, i) => (
              <g key={i}>
                <circle 
                  cx={pt.x} 
                  cy={pt.y} 
                  r="3.5" 
                  fill="#ffffff" 
                  stroke="#4f46e5" 
                  strokeWidth="2.5"
                />
                <circle 
                  cx={pt.x} 
                  cy={pt.y} 
                  r="8" 
                  fill="transparent" 
                  class="cursor-pointer group"
                />
              </g>
            ))}

            {/* Dynamic Labels */}
            {dataPoints.map((pt, i) => {
              const labelDist = r + 22;
              const lx = cx + labelDist * Math.cos(pt.angle);
              const ly = cy + labelDist * Math.sin(pt.angle);
              
              let textAnchor = "middle";
              if (Math.cos(pt.angle) > 0.1) textAnchor = "start";
              else if (Math.cos(pt.angle) < -0.1) textAnchor = "end";

              return (
                <text 
                  key={i} 
                  x={lx} 
                  y={ly + 4}
                  fontSize="8.5px" 
                  fontWeight="700"
                  fill="#475569" 
                  textAnchor={textAnchor}
                  class="select-none tracking-tight font-sans"
                >
                  {pt.label.length > 20 ? `${pt.label.substring(0, 18)}...` : pt.label} ({pt.value})
                </text>
              );
            })}
          </svg>
        </div>
      );
    };

    // Helper functions for CSV export
    const convertToCSV = (data) => {
      const headers = Object.keys(data[0]).join(",");
      const rows = data.map(item => {
        return Object.values(item).map(val => {
          let str = String(val).replace(/"/g, '""');
          if (str.includes(",") || str.includes("\n") || str.includes('"')) {
            str = `"${str}"`;
          }
          return str;
        }).join(",");
      });
      return [headers, ...rows].join("\n");
    };

    const triggerDownloadCSV = (csvContent, filename) => {
      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement("a");
      if (link.download !== undefined) {
        const url = URL.createObjectURL(blob);
        link.setAttribute("href", url);
        link.setAttribute("download", filename);
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      }
    };

                            onClick={() => {
                              setShowAddForm(false);
                              setEditingUnit(null);
                              setFormData({ code: "", title: "", cluster: "", level: "", description: "", rationale: "" });
                            }}
                            class="bg-slate-100 hover:bg-slate-200 text-slate-700 px-5 py-2.5 rounded-xl font-semibold transition"
                          >
                            Batal
                          </button>
                          <button 
                            type="submit" 
                            class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2.5 rounded-xl font-semibold shadow-sm transition"
                          >
                            {editingUnit ? "Simpan Perubahan" : "Formulasikan Unit Baru"}
                          </button>
                        </div>
                      </form>
                    </div>
                  )}

                  {/* Editable Proposed list in detailed card layout */}
                  <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    {proposedUnits.map((u) => (
                      <div key={u.id} class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm flex flex-col justify-between hover:border-indigo-100 hover:shadow-md transition">
                        <div>
                          <div class="flex items-center justify-between mb-4">
                            <span class="font-mono text-xs font-bold text-slate-400">{u.code}</span>
                            <span class="bg-indigo-50 text-indigo-700 font-bold px-2.5 py-0.5 rounded-full text-[9px] uppercase tracking-wide">{u.level}</span>
                          </div>
                          
                          <h4 class="text-sm font-bold text-slate-900 leading-snug mb-3 tracking-tight">{u.title}</h4>
                          
                          <div class="space-y-3.5 text-xs text-slate-600">
                            <div>
                              <p class="font-bold text-[10px] text-slate-400 uppercase tracking-widest mb-1">Rumusan Deskripsi:</p>
                              <p class="leading-relaxed bg-slate-50 p-3 rounded-xl border border-slate-100/50 text-slate-700">{u.description}</p>
                            </div>
                            <div>
                              <p class="font-bold text-[10px] text-indigo-400 uppercase tracking-widest mb-1">Rasional & Urgensi:</p>
                              <p class="leading-relaxed text-slate-500 italic">{u.rationale}</p>
                            </div>
                          </div>
                        </div>

                        <div class="flex items-center justify-between pt-6 mt-6 border-t border-slate-100">
                          <span class="text-[10px] text-slate-400 font-medium">Klaster: <strong class="text-slate-700">{u.cluster}</strong></span>
                          <div class="flex items-center space-x-2">
                            <button 
                              onClick={() => handleStartEdit(u)}
                              class="p-2 bg-slate-50 hover:bg-indigo-50 text-slate-500 hover:text-indigo-600 rounded-xl transition-colors"
                              title="Edit Unit"
                            >
                              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
                              </svg>
                            </button>
                            <button 
                              onClick={() => handleDeleteUnit(u.id)}
                              class="p-2 bg-slate-50 hover:bg-rose-50 text-slate-500 hover:text-rose-600 rounded-xl transition-colors"
                              title="Hapus Unit"
                            >
                              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                              </svg>
                            </button>
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>

                </div>
              )}


              {/* ===================================================
                  VIEW: PAGE 6 - DOCUMENT PREVIEW & PDF PRINT EXPORT
                  =================================================== */}
              {currentPage === "ekspor" && (
                <div class="space-y-8 animate-fade-in print-full-width">
                  
                  {/* Dynamic Manual Metadata Input Section for "Mengesahkan" Signature (No-Print) */}
                  <div class="no-print bg-white p-6 rounded-3xl border-2 border-indigo-100 shadow-sm space-y-4">
                    <h3 class="text-sm font-bold text-slate-900 tracking-tight flex items-center space-x-2">
                      <svg class="w-5 h-5 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                      </svg>
                      <span>Lengkapi Identitas Dokumen Sebelum Mencetak / Ekspor</span>
                    </h3>
                    <p class="text-xs text-slate-500 leading-relaxed">
                      Silakan isi atau sesuaikan Nama Pengesah dan Jabatan Pengesah di bawah ini secara manual. Perubahan data akan langsung ter-render secara real-time pada pratinjau dokumen kerja, lembar tanda tangan pengesahan, dan dokumen PDF cetak.
                    </p>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-xs">
                      <div>
                        <label class="block font-bold text-slate-700 uppercase tracking-wide mb-1.5">Nama Pengesah</label>
                        <input 
                          type="text" 
                          value={namaPengesah}
                          onChange={(e) => handleSaveSignatureMetadata(e.target.value, jabatanPengesah)}
                          placeholder="Masukkan nama pengesah..."
                          class="w-full bg-slate-55 border border-slate-200 rounded-xl px-4 py-2.5 text-slate-800 font-semibold focus:outline-none focus:ring-1 focus:ring-indigo-500"
                        />
                      </div>
                      <div>
                        <label class="block font-bold text-slate-700 uppercase tracking-wide mb-1.5">Jabatan / Lembaga Pengesah</label>
                        <input 
                          type="text" 
                          value={jabatanPengesah}
                          onChange={(e) => handleSaveSignatureMetadata(namaPengesah, e.target.value)}
                          placeholder="Masukkan jabatan pengesah..."
                          class="w-full bg-slate-55 border border-slate-200 rounded-xl px-4 py-2.5 text-slate-800 font-semibold focus:outline-none focus:ring-1 focus:ring-indigo-500"
                        />
                      </div>
                    </div>
                  </div>

                  {/* Action Dashboard Tools bar - Hidden on print */}
                  <div class="no-print bg-white p-6 rounded-3xl border border-slate-100 shadow-sm flex flex-col md:flex-row md:items-center justify-between gap-4">
                    <div>
                      <h2 class="text-sm font-bold text-slate-900 tracking-tight">Dokumen Hasil Rumusan Akhir</h2>
                      <p class="text-xs text-slate-500 mt-1">Gunakan tombol cetak di bawah ini untuk membuat file PDF, atau ekspor data ke file CSV.</p>
                    </div>

                    <div class="flex flex-wrap gap-2.5">
                      <button 
                        onClick={() => window.print()}
                        class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2.5 rounded-xl text-xs font-semibold shadow-sm transition flex items-center space-x-2"
                      >
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" />
                        </svg>
                        <span>Cetak ke PDF / Simpan</span>
                      </button>

                      <button 
                        onClick={() => {
                          const csvContent = convertToCSV(proposedUnits);
                          triggerDownloadCSV(csvContent, "Usulan_Kompetensi_HCM_Terkini_LSP.csv");
                        }}
                        class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2.5 rounded-xl text-xs font-semibold shadow-sm transition flex items-center space-x-2"
                      >
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                        </svg>
                        <span>Unduh CSV Usulan</span>
                      </button>
                    </div>
                  </div>

                  {/* Print Document container representing Academic Paper */}
                  <div id="printable-area" class="bg-white p-8 md:p-16 rounded-3xl border border-slate-200/60 shadow-xl max-w-4xl mx-auto space-y-12 text-slate-800 leading-relaxed print-full-width">
                    
                    {/* Header Academic Report */}
                    <div class="text-center space-y-4 border-b-2 border-slate-900 pb-8">
                      <p class="text-xs uppercase font-extrabold tracking-widest text-indigo-600">Kertas Kerja Hasil Sintesis Akademik</p>
                      <h1 class="academic-title text-2xl md:text-3xl font-bold text-slate-900">
                        REKOMENDASI INTEGRASI STANDAR KOMPETENSI HUMAN CAPITAL MANAGEMENT NASIONAL & GLOBAL
                      </h1>
                      <p class="text-sm font-medium text-slate-600">
                        Tinjauan Komparatif SKKNI No. 307/2014 (104 Unit), SKKNI No. 149/2020 (61 Unit), dan Lanskap Disrupsi HCM Global 2026
                      </p>
                      <div class="text-xs text-slate-400 font-mono flex flex-wrap items-center justify-center gap-4 pt-2">
                        <span>Penerbit: {namaOrganisasi}</span>
                        <span>•</span>
                        <span>Tanggal Audit: 1 Juli 2026</span>
                        <span>•</span>
                        <span>Lokasi: Jakarta, Indonesia</span>
                        <span>•</span>
                        <span class="font-bold text-slate-700">Developed by Iman N Bajuasijadji</span>
                      </div>
                    </div>

                    {/* Section 1: Pendahuluan */}
                    <div class="space-y-4">
                      <h3 class="text-sm font-extrabold text-slate-900 uppercase tracking-widest border-l-4 border-slate-900 pl-3">I. Pendahuluan</h3>
                      <p class="text-xs text-slate-600 text-justify leading-relaxed">
                        Manajemen Sumber Daya Manusia (MSDM) di tingkat nasional tengah menghadapi tantangan eksponensial berupa asimilasi kecerdasan buatan generatif, ketidakpastian geopolitik global, dan fragmentasi iklim kerja. Dokumen kertas kerja ini merangkum perbandingan kritis tiga sudut pandang standardisasi utama: standar fungsional transaksional masa lalu yang sangat luas mencakup 104 Unit Kompetensi (SKKNI No. 307/2014), standar integrasi berbasis performa kerja dengan 61 Unit Kompetensi (SKKNI No. 149/2020), dan draf ketangkasan resiliensi masa kini berbasis global tanpa batasan kode unit (Riset Kompetensi HCM Global). Hasil akhir analisis melahirkan 6 rumusan usulan unit kompetensi teranyar untuk diujikan pada tingkat sertifikasi strategis nasional.
                      </p>
                    </div>

                    {/* Section 2: Matriks Komparasi Ringkas */}
                    <div class="space-y-4">
                      <h3 class="text-sm font-extrabold text-slate-900 uppercase tracking-widest border-l-4 border-slate-900 pl-3">II. Matriks Komparasi Tiga Standar</h3>
                      <p class="text-xs text-slate-600">Pemetaan sumbu kematangan dan orientasi dari ketiga pendekatan standardisasi yang dianalisis:</p>
                      
                      <table class="w-full text-left border-collapse text-[10px] border border-slate-200">
                        <thead>
                          <tr class="bg-slate-50 font-bold border-b border-slate-300">
                            <th class="p-2 border-r border-slate-200 w-1/4">Sumbu Fokus</th>
                            <th class="p-2 border-r border-slate-200 w-1/4">SKKNI 307/2014 (104 Unit)</th>
                            <th class="p-2 border-r border-slate-200 w-1/4">SKKNI 149/2020 (61 Unit)</th>
                            <th class="p-2 w-1/4">HCM Global Research (Tanpa Kode)</th>
                          </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-200 text-slate-600">
                          <tr>
                            <td class="p-2 font-bold text-slate-800 border-r border-slate-200">Arsitektur Dasar</td>
                            <td class="p-2 border-r border-slate-200">Administrasi, pencatatan berkas personalia, & kepatuhan normatif fungsional.</td>
                            <td class="p-2 border-r border-slate-200">Manajemen Talenta terpadu menyokong pilar bisnis berkelanjutan.</td>
                            <td class="p-2">Ketangkasan dinamis (Stagility) & tata kelola digital trust organisasi global.</td>
                          </tr>
                          <tr>
                            <td class="p-2 font-bold text-slate-800 border-r border-slate-200">Kebutuhan Talenta</td>
                            <td class="p-2 border-r border-slate-200">Taktis jangka pendek, rekrutmen fungsional transaksional.</td>
                            <td class="p-2 border-r border-slate-200">Perencanaan suksesi & pemetaan karier bertahap sistematis.</td>
                            <td class="p-2">Jalur reskilling micro-learning adaptif didorong AI personalisasi.</td>
                          </tr>
                          <tr>
                            <td class="p-2 font-bold text-slate-800 border-r border-slate-200">Aspek Psikososial</td>
                            <td class="p-2 border-r border-slate-200">Kepatuhan UU normatif sebatas administrasi fisik karyawan.</td>
                            <td class="p-2 border-r border-slate-200">Kemitraan serikat pekerja, penyelesaian sengketa bipartite.</td>
                            <td class="p-2">Keamanan Psikologis, pencegahan burnout, green HR & ESG.</td>
                          </tr>
                        </tbody>
                      </table>
                    </div>

                    <div class="page-break"></div>

                    {/* Section 3: Daftar Usulan Detail */}
                    <div class="space-y-6 pt-8">
                      <h3 class="text-sm font-extrabold text-slate-900 uppercase tracking-widest border-l-4 border-slate-900 pl-3">III. Usulan Formulasi Rumusan Unit Kompetensi Baru</h3>
                      <p class="text-xs text-slate-600 text-justify">
                        Berikut adalah draf detail usulan unit kompetensi teranyar yang diformulasikan dari hasil analisis gap komparatif. Seluruh unit di bawah ini dirancang untuk menjawab tuntutan zaman dengan mengedepankan efektivitas, keluwesan, dan keberlanjutan psikososial pekerja.
                      </p>

                      <div class="space-y-6">
                        {proposedUnits.map((u, i) => (
                          <div key={u.id} class="border-b border-slate-200 pb-6 last:border-0">
                            <div class="flex items-center justify-between mb-2">
                              <h4 class="text-xs font-bold text-slate-900 font-mono">
                                {i + 1}. {u.code} — {u.title}
                              </h4>
                              <span class="bg-slate-100 text-slate-800 text-[8px] font-bold px-2 py-0.5 rounded border border-slate-200 uppercase">{u.level}</span>
                            </div>
                            <div class="pl-4 space-y-2 text-xs text-slate-600">
                              <p><strong class="text-slate-800">Definisi Tugas:</strong> {u.description}</p>
                              <p class="italic"><strong class="text-slate-800 font-normal">Rasional Urgensi:</strong> {u.rationale}</p>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>

                    {/* Section 4: Signature block - MODIFIED TO SHOW ONLY MENGESAHKAN & MANUALLY EDITABLE */}
                    <div class="pt-12">
                      <div class="flex justify-end text-center text-xs text-slate-500">
                        <div class="w-64 space-y-16">
                          <p>Mengesahkan,<br/><strong class="text-slate-900">{jabatanPengesah}</strong></p>
                          <p class="font-bold underline text-slate-800">{namaPengesah}</p>
                        </div>
                      </div>
                    </div>

                  </div>
                </div>
              )}

            </div>
          </main>
        </div>
      );
    };

    // Render App inside div#root on load
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
